<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>achaDO · Telas (claro + escuro)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #efece6; font-family: "Geist", system-ui, sans-serif; }
  /* artboards in the design canvas must contain the app fully */
  .artboard-root { width: 100%; height: 100%; overflow: hidden; border-radius: 6px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const W = 1280;
  const H = 880;

  function Frame({ theme, children }) {
    return (
      <div className="artboard-root">
        <Screen theme={theme}>
          <Sidebar active={
            children.type === Dashboard ? 'dash' :
            children.type === Termos ? 'termos' :
            children.type === Achados ? 'achados' :
            'config'
          } />
          {children}
        </Screen>
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="dashboard" title="01 · Dashboard" subtitle="Status do último ciclo · KPIs · fontes · achados recentes">
          <DCArtboard id="dash-light" label="Claro" width={W} height={H}>
            <Frame theme="light"><Dashboard/></Frame>
          </DCArtboard>
          <DCArtboard id="dash-dark" label="Escuro" width={W} height={H}>
            <Frame theme="dark"><Dashboard/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="termos" title="02 · Termos de busca" subtitle="CRUD · keyword · frase · regex · filtros opcionais">
          <DCArtboard id="termos-light" label="Claro" width={W} height={H}>
            <Frame theme="light"><Termos/></Frame>
          </DCArtboard>
          <DCArtboard id="termos-dark" label="Escuro" width={W} height={H}>
            <Frame theme="dark"><Termos/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="achados" title="03 · Achados" subtitle="Histórico de matches · trecho destacado · link para a edição original">
          <DCArtboard id="ach-light" label="Claro" width={W} height={H}>
            <Frame theme="light"><Achados/></Frame>
          </DCArtboard>
          <DCArtboard id="ach-dark" label="Escuro" width={W} height={H}>
            <Frame theme="dark"><Achados/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="config" title="04 · Configurações" subtitle="SMTP no chaveiro do SO · agendamento · preferências de notificação">
          <DCArtboard id="cfg-light" label="Claro" width={W} height={H}>
            <Frame theme="light"><Configuracoes/></Frame>
          </DCArtboard>
          <DCArtboard id="cfg-dark" label="Escuro" width={W} height={H}>
            <Frame theme="dark"><Configuracoes/></Frame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
